<!DOCTYPE html>
<html>
<head>
  <title>FOF Attendance System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
    }
    input {
      padding: 8px;
      margin: 5px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:disabled {
      background: grey;
    }
  </style>
</head>

<body>

<h2>Faculty of Forestry Attendance</h2>

<p id="status">⚠ Click "Enable Location" to continue</p>

<!-- NEW BUTTON -->
<button onclick="enableLocation()">Enable Location</button>

<form id="form">
  <input type="text" id="name" placeholder="Name" required><br>
  <input type="text" id="semester" placeholder="Semester" required><br>
  <input type="text" id="subject" placeholder="Subject" required><br><br>

  <button type="submit" id="submitBtn" disabled>Submit Attendance</button>
</form>

<script>
const TARGET_LAT = 27.41;
const TARGET_LON = 85.02;
const RADIUS = 150;

const scriptURL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

let currentLat = null;
let currentLon = null;

// distance formula
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) *
            Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ENABLE LOCATION BUTTON FUNCTION
function enableLocation() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  document.getElementById("status").innerText = "Checking location...";

  navigator.geolocation.getCurrentPosition(position => {
    currentLat = position.coords.latitude;
    currentLon = position.coords.longitude;

    const distance = getDistance(currentLat, currentLon, TARGET_LAT, TARGET_LON);

    if (distance <= RADIUS) {
      document.getElementById("status").innerText = "✅ Within attendance zone";
      document.getElementById("submitBtn").disabled = false;
    } else {
      document.getElementById("status").innerText = "❌ Outside allowed area";
      document.getElementById("submitBtn").disabled = true;
    }

  }, () => {
    alert("Location permission denied!");
    document.getElementById("status").innerText = "❌ Location required";
  });
}

// SUBMIT FORM
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (!currentLat || !currentLon) {
    alert("Enable location first!");
    return;
  }

  const now = new Date();

  const data = {
    name: document.getElementById("name").value,
    semester: document.getElementById("semester").value,
    subject: document.getElementById("subject").value,
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString(),
    lat: currentLat,
    lon: currentLon
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    if (response === "DUPLICATE") {
      alert("⚠ Already marked within 40 minutes");
    } else {
      alert("✅ Attendance Submitted");
      document.getElementById("form").reset();
      document.getElementById("submitBtn").disabled = true;
      document.getElementById("status").innerText = "⚠ Click 'Enable Location' again";
    }
  });
});
</script>

</body>
</html>
