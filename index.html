<!DOCTYPE html>
<html>
<head>
  <title>FOF Attendance System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 220px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:disabled {
      background: grey;
      cursor: not-allowed;
    }

    /* Tooltip balloon */
    .tooltip {
      position: relative;
      display: inline-block;
    }

    .tooltip .tooltiptext {
      visibility: hidden;
      width: 260px;
      background-color: #ff4d4d;
      color: #fff;
      text-align: center;
      padding: 8px;
      border-radius: 6px;

      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%);

      opacity: 0;
      transition: opacity 0.3s;
    }

    .tooltip .tooltiptext::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #ff4d4d transparent transparent transparent;
    }

    .tooltip.show .tooltiptext {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>

<body>

<h2>Faculty of Forestry Attendance</h2>

<p id="status">⚠ Click "Enable Location" to continue</p>

<button onclick="enableLocation()">Enable Location</button>

<br><br>

<form id="form">
  <input type="text" id="name" placeholder="Name" required><br>
  <input type="text" id="semester" placeholder="Semester" required><br>
  <input type="text" id="subject" placeholder="Subject" required><br><br>

  <div class="tooltip" id="tooltipBox">
    <button type="submit" id="submitBtn" disabled>Submit Attendance</button>
    <span class="tooltiptext">
      You cannot register your attendance when outside campus area
    </span>
  </div>
</form>

<script>
const TARGET_LAT = 27.41;
const TARGET_LON = 85.029;
const RADIUS = 100;

const scriptURL = https://script.google.com/a/macros/afu.edu.np/s/AKfycbzCJwp_FRwrvCPrBbqVXnvHTKxYxGVMugTDCOQA7Eb6v-MkVd2pq0cyVADedjbf3qFu/exec;

let currentLat = null;
let currentLon = null;

// Distance formula
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) *
            Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2)**2;

  return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Enable location
function enableLocation() {
  const tooltip = document.getElementById("tooltipBox");

  if (!navigator.geolocation) {
    alert("❌ Geolocation not supported in this browser.");
    return;
  }

  document.getElementById("status").innerText = "📍 Requesting location...";

  // FORCE permission prompt by calling again
  navigator.geolocation.getCurrentPosition(
    function(position) {

      currentLat = position.coords.latitude;
      currentLon = position.coords.longitude;

      // DEBUG (IMPORTANT)
      alert("Location detected:\nLat: " + currentLat + "\nLon: " + currentLon);

      const distance = getDistance(currentLat, currentLon, TARGET_LAT, TARGET_LON);

      document.getElementById("status").innerText =
        "Distance from campus: " + Math.round(distance) + " meters";

      if (distance <= RADIUS) {
        document.getElementById("submitBtn").disabled = false;
        tooltip.classList.remove("show");
      } else {
        document.getElementById("submitBtn").disabled = true;
        tooltip.classList.add("show");
      }
    },

    function(error) {
      let msg = "";

      if (error.code === 1) msg = "❌ Permission denied";
      else if (error.code === 2) msg = "❌ Location unavailable";
      else if (error.code === 3) msg = "❌ Timeout (GPS slow)";
      else msg = "❌ Unknown error";

      document.getElementById("status").innerText = msg;
      alert(msg);
    },

    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );
}

// Submit form
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (!currentLat || !currentLon) {
    alert("Enable location first!");
    return;
  }

  const now = new Date();

  const data = {
    name: document.getElementById("name").value,
    semester: document.getElementById("semester").value,
    subject: document.getElementById("subject").value,
    date: now.toLocaleDateString(),
    time: now.toLocaleTimeString(),
    lat: currentLat,
    lon: currentLon
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    if (response === "DUPLICATE") {
      alert("⚠ Already marked within 40 minutes");
    } else {
      alert("✅ Attendance Submitted");
      document.getElementById("form").reset();
      document.getElementById("submitBtn").disabled = true;
      document.getElementById("status").innerText = "⚠ Click 'Enable Location' again";
    }
  });
});
</script>

</body>
</html>
